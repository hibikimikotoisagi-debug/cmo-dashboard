<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Retention — 視聴維持率分析</title>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f8fafc;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;font-size:14px;}
.topbar{background:#1e293b;padding:0 16px;display:flex;align-items:center;gap:0;height:44px;overflow-x:auto;white-space:nowrap;}
.topbar .brand{font-size:13px;font-weight:700;color:#f1f5f9;margin-right:20px;flex-shrink:0;}
.topbar a{color:#94a3b8;font-size:12px;padding:0 12px;height:44px;line-height:44px;display:inline-block;border-bottom:2px solid transparent;text-decoration:none;}
.topbar a:hover,.topbar a.active{color:#f1f5f9;border-bottom-color:#3b82f6;}
.main{max-width:1100px;margin:0 auto;padding:20px 16px;}
.page-title{font-size:18px;font-weight:500;color:#0f172a;margin-bottom:4px;}
.section{margin-bottom:24px;}
.box{background:#fff;border:0.5px solid #e2e8f0;padding:14px;margin-bottom:8px;border-radius:8px;}
.box-title{color:#0f172a;font-weight:500;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid #e2e8f0;font-size:13px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;}
.kpi-card{background:#fff;border:0.5px solid #e2e8f0;padding:12px;text-align:center;border-radius:8px;}
.kpi-label{color:#64748b;font-size:10px;margin-bottom:3px;}
.kpi-val{font-weight:500;font-size:22px;color:#2563eb;margin-top:2px;}
.kpi-val.warn{color:#d97706;}.kpi-val.danger{color:#dc2626;}.kpi-val.good{color:#16a34a;}
.bar-wrap{margin-top:6px;background:#e2e8f0;height:5px;border-radius:3px;overflow:hidden;}
.bar{height:100%;background:#2563eb;border-radius:3px;transition:width 0.4s;}
.bar.warn{background:#d97706;}.bar.danger{background:#dc2626;}.bar.good{background:#16a34a;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#f8fafc;color:#475569;padding:8px 10px;text-align:left;border-bottom:0.5px solid #e2e8f0;font-weight:500;}
td{padding:7px 10px;border-bottom:0.5px solid #f1f5f9;}
tr:hover td{background:#f8fafc;}
.tag{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:500;}
.tag-video{background:#dbeafe;color:#1e3a8a;}.tag-image{background:#dcfce7;color:#14532d;}
.tag-meta{background:#dbeafe;color:#1e3a8a;}.tag-win{background:#dcfce7;color:#14532d;}
.tag-lose{background:#fee2e2;color:#991b1b;}.tag-other{background:#f1f5f9;color:#475569;}
.alert-box{background:#fef2f2;border:0.5px solid #fca5a5;padding:10px;font-size:12px;color:#dc2626;margin-bottom:10px;border-radius:6px;}
.pending{color:#94a3b8;font-size:12px;text-align:center;padding:20px;}
.score-bar{display:flex;align-items:center;gap:8px;}
.score-num{min-width:50px;text-align:right;font-weight:500;}
.status-bar{font-size:12px;color:#64748b;margin-bottom:16px;}
.task-row{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:0.5px solid #f1f5f9;font-size:12px;}
.task-row:last-child{border-bottom:none;}
.task-id{color:#94a3b8;min-width:72px;font-size:11px;}.task-name{flex:1;}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:500;}
.pill-red{background:#fee2e2;color:#991b1b;}.pill-blue{background:#dbeafe;color:#1e3a8a;}
.pill-green{background:#dcfce7;color:#14532d;}.pill-amber{background:#fef3c7;color:#92400e;}
.pill-gray{background:#f1f5f9;color:#475569;}
.sa-card{background:#fff;border:0.5px solid #e2e8f0;padding:14px;border-radius:8px;}
.sa-name{font-size:12px;font-weight:500;color:#0f172a;margin-bottom:8px;}
.sa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px;}
.count-bar{display:flex;gap:8px;font-size:12px;margin-bottom:4px;flex-wrap:wrap;}
.empty{color:#94a3b8;font-size:12px;}
select{border:0.5px solid #e2e8f0;background:#fff;padding:5px 10px;font-size:12px;border-radius:6px;font-family:inherit;}
.col-filter button{background:#f1f5f9;border:0.5px solid #e2e8f0;padding:4px 12px;cursor:pointer;font-size:11px;border-radius:99px;font-family:inherit;}
.col-filter button.active{background:#2563eb;color:#fff;border-color:#2563eb;}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">CMO</span>
  <a href="cmo_index.html">全体</a>
  <a href="roas_by_creative.html">ROAS分析</a>
  <a href="creative_intelligence_dashboard.html">AI分析</a>
  <a href="hook_dashboard.html">Hook分析</a>
  <a href="retention_dashboard.html" class="active">Retention</a>
</div>
<div class="main">
<div class="page-title">Retention — 視聴維持率分析</div>
<div id="status-bar" class="status-bar">読込中...</div>

<!-- 平均維持率ファネル -->
<div class="section">
  <div class="box">
    <div class="box-title">━ 視聴維持率ファネル（全動画平均）</div>
    <div id="retention-funnel">
      <div class="pending">Vimeo APIキー待ち — vimeo_agent.py を有効化後に表示</div>
    </div>
  </div>
</div>

<!-- 完視聴率 & 主要KPI -->
<div class="section">
  <div class="box">
    <div class="box-title">━ 主要KPI</div>
    <div id="main-kpi" class="kpi-grid">
      <div class="pending">読込中...</div>
    </div>
  </div>
</div>

<!-- 高維持率・低維持率動画 -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
  <div class="box">
    <div class="box-title">✅ 高維持率TOP5</div>
    <div id="high-retention"></div>
  </div>
  <div class="box">
    <div class="box-title">⚠️ 低維持率（要改善）</div>
    <div id="low-retention"></div>
  </div>
</div>

<!-- アラート -->
<div id="alert-section" class="section" style="display:none">
  <div class="alert-box" id="alerts"></div>
</div>

<!-- 全動画テーブル -->
<div class="section">
  <div class="box">
    <div class="box-title">━ 動画別 視聴維持率一覧</div>
    <div id="video-table"></div>
  </div>
</div>

<script>
const pct = n => n == null ? '-' : n + '%';
const sec = n => n == null ? '-' : Math.floor(n/60) + 'min' + (n%60) + 's';
const colorClass = (val, thresholds) => {
  if (val == null) return '';
  if (val >= thresholds[1]) return 'good';
  if (val >= thresholds[0]) return 'warn';
  return 'danger';
};

fetch('../analytics/video_retention_latest.json?_=' + Date.now())
  .then(r => r.json()).then(d => {
    document.getElementById('status-bar').textContent =
      `集計日: ${d.date || '-'} | 期間: ${d.period || '-'} | ステータス: ${d._status || '-'}`;

    if (!d || d._status !== 'ok') {
      const msg = `<div class="pending">${d._note || 'Vimeo APIキー待ち'}<br><br>vimeo_agent.pyを実行後にデータが表示されます</div>`;
      ['retention-funnel','main-kpi','high-retention','low-retention','video-table'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = msg;
      });
      return;
    }

    const vids = d.videos || [];
    const avg = key => {
      const vals = vids.map(v => v[key]).filter(v => v != null);
      return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10 : null;
    };

    // ファネル表示
    const funnelSteps = [
      ['再生開始',    avg('play_start_rate'),  [85, 95], '#1a5fa8'],
      ['3秒到達',     avg('reach_3sec'),        [70, 85], '#2a6a8a'],
      ['5秒到達',     avg('reach_5sec'),        [55, 70], '#3a5a7a'],
      ['15秒到達',    avg('reach_15sec'),       [40, 55], '#4a4a6a'],
      ['25%到達',     avg('reach_25pct'),       [35, 50], '#5a3a5a'],
      ['50%到達',     avg('reach_50pct'),       [25, 40], '#6a2a4a'],
      ['75%到達',     avg('reach_75pct'),       [20, 35], '#7a1a3a'],
      ['95%到達',     avg('reach_95pct'),       [15, 28], '#8a0a2a'],
      ['完視聴',      avg('completion_rate'),   [12, 25], '#c0392b'],
    ];

    document.getElementById('retention-funnel').innerHTML = funnelSteps.map(([label, val, th, color]) => {
      const barPct = val != null ? Math.min(100, val) : 0;
      const cls = colorClass(val, th);
      const fmtd = pct(val);
      return `<div class="funnel-row">
        <div class="funnel-label">${label}</div>
        <div class="funnel-bar-wrap">
          <div class="funnel-bar ${cls}" style="width:${barPct}%"></div>
        </div>
        <div class="funnel-pct" style="color:${cls==='good'?'#2a7a2a':cls==='warn'?'#b07000':'#c0392b'}">${fmtd}</div>
      </div>`;
    }).join('');

    // 主要KPI
    const s = d.summary || {};
    const kpis = [
      ['分析動画数', s.total_videos_analyzed + '本', []],
      ['平均完視聴率', pct(s.avg_completion_rate), [12, 25]],
      ['平均3秒到達', pct(avg('reach_3sec')), [70, 85]],
      ['平均15秒到達', pct(avg('reach_15sec')), [40, 55]],
      ['平均50%到達', pct(avg('reach_50pct')), [25, 40]],
      ['CTA到達率', pct(s.avg_cta_click_rate), [5, 15]],
    ];
    document.getElementById('main-kpi').innerHTML = kpis.map(([label, val, th]) => {
      const cls = th.length ? colorClass(parseFloat(val), th) : '';
      return `<div class="kpi-card">
        <div class="kpi-label">${label}</div>
        <div class="kpi-val ${cls}">${val}</div>
      </div>`;
    }).join('');

    // 高維持率
    const highVids = d.top_retention_videos || [];
    document.getElementById('high-retention').innerHTML = highVids.length
      ? highVids.map(v => `<div style="padding:4px 0;border-bottom:1px solid #f0ebe0;font-size:11px;">
          <div style="color:#2a7a2a;font-weight:bold;">${pct(v.completion_rate)}</div>
          <div style="color:#2c2a26;">${v.title?.substring(0,35)||'-'}</div>
        </div>`).join('')
      : '<div class="pending">データなし</div>';

    // 低維持率
    const lowVids = d.low_retention_videos || [];
    document.getElementById('low-retention').innerHTML = lowVids.length
      ? lowVids.map(v => `<div style="padding:4px 0;border-bottom:1px solid #f0ebe0;font-size:11px;">
          <div style="color:#c0392b;font-weight:bold;">${pct(v.completion_rate)}</div>
          <div style="color:#2c2a26;">${v.title?.substring(0,35)||'-'}</div>
          ${v._alert ? `<div style="font-size:10px;color:#c0392b;">${v._alert}</div>` : ''}
        </div>`).join('')
      : '<div class="pending">データなし</div>';

    // アラート
    const alerts = d.alerts || [];
    if (alerts.length > 0) {
      document.getElementById('alert-section').style.display = '';
      document.getElementById('alerts').innerHTML = '🚨 アラート<br>' + alerts.map(a => `・${a}`).join('<br>');
    }

    // 全動画テーブル
    const sorted = [...vids].sort((a,b) => (b.completion_rate||0) - (a.completion_rate||0));
    document.getElementById('video-table').innerHTML = sorted.length ? `
      <table>
        <thead><tr>
          <th>タイトル</th><th>3秒</th><th>15秒</th><th>25%</th><th>50%</th><th>75%</th><th>完視聴</th><th>CTA</th>
        </tr></thead>
        <tbody>
          ${sorted.map(v => {
            const r3c  = colorClass(v.reach_3sec, [70,85]);
            const r15c = colorClass(v.reach_15sec, [40,55]);
            const r50c = colorClass(v.reach_50pct, [25,40]);
            const rc   = colorClass(v.completion_rate, [12,25]);
            return `<tr>
              <td title="${v.title}">${v.title?.substring(0,30)||'-'}</td>
              <td style="color:${r3c==='good'?'#2a7a2a':r3c==='warn'?'#b07000':'#c0392b'}">${pct(v.reach_3sec)}</td>
              <td style="color:${r15c==='good'?'#2a7a2a':r15c==='warn'?'#b07000':'#c0392b'}">${pct(v.reach_15sec)}</td>
              <td>${pct(v.reach_25pct)}</td>
              <td style="color:${r50c==='good'?'#2a7a2a':r50c==='warn'?'#b07000':'#c0392b'}">${pct(v.reach_50pct)}</td>
              <td>${pct(v.reach_75pct)}</td>
              <td style="font-weight:bold;color:${rc==='good'?'#2a7a2a':rc==='warn'?'#b07000':'#c0392b'}">${pct(v.completion_rate)}</td>
              <td>${pct(v.cta_click_rate)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>` : '<div class="pending">データなし</div>';

  }).catch(() => {
    ['retention-funnel','main-kpi','high-retention','low-retention','video-table'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = '<div class="pending">video_retention_latest.jsonが未生成 — vimeo_agent.pyを実行してください</div>';
    });
  });
</script>
</div>
</body>
</html>
