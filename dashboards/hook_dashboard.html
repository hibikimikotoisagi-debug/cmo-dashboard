<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hook Dashboard — 冒頭フック分析</title>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f8fafc;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;font-size:14px;}
.topbar{background:#1e293b;padding:0 16px;display:flex;align-items:center;gap:0;height:44px;overflow-x:auto;white-space:nowrap;}
.topbar .brand{font-size:13px;font-weight:700;color:#f1f5f9;margin-right:20px;flex-shrink:0;}
.topbar a{color:#94a3b8;font-size:12px;padding:0 12px;height:44px;line-height:44px;display:inline-block;border-bottom:2px solid transparent;text-decoration:none;}
.topbar a:hover,.topbar a.active{color:#f1f5f9;border-bottom-color:#3b82f6;}
.main{max-width:1100px;margin:0 auto;padding:20px 16px;}
.page-title{font-size:18px;font-weight:500;color:#0f172a;margin-bottom:4px;}
.section{margin-bottom:24px;}
.box{background:#fff;border:0.5px solid #e2e8f0;padding:14px;margin-bottom:8px;border-radius:8px;}
.box-title{color:#0f172a;font-weight:500;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid #e2e8f0;font-size:13px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;}
.kpi-card{background:#fff;border:0.5px solid #e2e8f0;padding:12px;text-align:center;border-radius:8px;}
.kpi-label{color:#64748b;font-size:10px;margin-bottom:3px;}
.kpi-val{font-weight:500;font-size:22px;color:#2563eb;margin-top:2px;}
.kpi-val.warn{color:#d97706;}.kpi-val.danger{color:#dc2626;}.kpi-val.good{color:#16a34a;}
.bar-wrap{margin-top:6px;background:#e2e8f0;height:5px;border-radius:3px;overflow:hidden;}
.bar{height:100%;background:#2563eb;border-radius:3px;transition:width 0.4s;}
.bar.warn{background:#d97706;}.bar.danger{background:#dc2626;}.bar.good{background:#16a34a;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#f8fafc;color:#475569;padding:8px 10px;text-align:left;border-bottom:0.5px solid #e2e8f0;font-weight:500;}
td{padding:7px 10px;border-bottom:0.5px solid #f1f5f9;}
tr:hover td{background:#f8fafc;}
.tag{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:500;}
.tag-video{background:#dbeafe;color:#1e3a8a;}.tag-image{background:#dcfce7;color:#14532d;}
.tag-meta{background:#dbeafe;color:#1e3a8a;}.tag-win{background:#dcfce7;color:#14532d;}
.tag-lose{background:#fee2e2;color:#991b1b;}.tag-other{background:#f1f5f9;color:#475569;}
.alert-box{background:#fef2f2;border:0.5px solid #fca5a5;padding:10px;font-size:12px;color:#dc2626;margin-bottom:10px;border-radius:6px;}
.pending{color:#94a3b8;font-size:12px;text-align:center;padding:20px;}
.score-bar{display:flex;align-items:center;gap:8px;}
.score-num{min-width:50px;text-align:right;font-weight:500;}
.status-bar{font-size:12px;color:#64748b;margin-bottom:16px;}
.task-row{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:0.5px solid #f1f5f9;font-size:12px;}
.task-row:last-child{border-bottom:none;}
.task-id{color:#94a3b8;min-width:72px;font-size:11px;}.task-name{flex:1;}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:500;}
.pill-red{background:#fee2e2;color:#991b1b;}.pill-blue{background:#dbeafe;color:#1e3a8a;}
.pill-green{background:#dcfce7;color:#14532d;}.pill-amber{background:#fef3c7;color:#92400e;}
.pill-gray{background:#f1f5f9;color:#475569;}
.sa-card{background:#fff;border:0.5px solid #e2e8f0;padding:14px;border-radius:8px;}
.sa-name{font-size:12px;font-weight:500;color:#0f172a;margin-bottom:8px;}
.sa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px;}
.count-bar{display:flex;gap:8px;font-size:12px;margin-bottom:4px;flex-wrap:wrap;}
.empty{color:#94a3b8;font-size:12px;}
select{border:0.5px solid #e2e8f0;background:#fff;padding:5px 10px;font-size:12px;border-radius:6px;font-family:inherit;}
.col-filter button{background:#f1f5f9;border:0.5px solid #e2e8f0;padding:4px 12px;cursor:pointer;font-size:11px;border-radius:99px;font-family:inherit;}
.col-filter button.active{background:#2563eb;color:#fff;border-color:#2563eb;}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">CMO</span>
  <a href="cmo_index.html">全体</a>
  <a href="roas_by_creative.html">ROAS分析</a>
  <a href="creative_intelligence_dashboard.html">AI分析</a>
  <a href="hook_dashboard.html" class="active">Hook分析</a>
  <a href="retention_dashboard.html">Retention</a>
</div>
<div class="main">
<div class="page-title">Hook Dashboard — 冒頭フック分析</div>
<div id="status-bar" class="status-bar">読込中...</div>

<!-- 平均到達率 -->
<div class="section">
  <div class="box">
    <div class="box-title">━ 平均到達率（Vimeo視聴データ）</div>
    <div id="reach-grid" class="kpi-grid">
      <div class="pending">Vimeo APIキー待ち — vimeo_agent.py を有効化後に表示</div>
    </div>
  </div>
</div>

<!-- Hook Score ランキング（Meta Ads） -->
<div class="section">
  <div class="box">
    <div class="box-title">━ Hook Score ランキング（Meta広告）</div>
    <div id="hook-rank">
      <div class="pending">読込中...</div>
    </div>
  </div>
</div>

<!-- Creative Type 比較 -->
<div class="section">
  <div class="box">
    <div class="box-title">━ 動画 vs 画像 クリエイティブ比較</div>
    <div id="type-compare">
      <div class="pending">読込中...</div>
    </div>
  </div>
</div>

<!-- アラート -->
<div class="section" id="alert-section" style="display:none">
  <div class="alert-box" id="alerts"></div>
</div>

<!-- 全広告テーブル -->
<div class="section">
  <div class="box">
    <div class="box-title">━ 広告別 Hook Score 一覧</div>
    <div id="ad-table"></div>
  </div>
</div>

<script>
const fmt = n => n == null ? '-' : '¥' + Math.round(n).toLocaleString('ja-JP');
const pct = n => n == null ? '-' : n + '%';
const colorClass = (val, thresholds) => {
  if (val == null) return '';
  if (val >= thresholds[1]) return 'good';
  if (val >= thresholds[0]) return 'warn';
  return 'danger';
};

// Vimeo Retention データ（到達率）
fetch('../analytics/video_retention_latest.json?_=' + Date.now())
  .then(r => r.json()).then(d => {
    if (!d || d._status !== 'ok') {
      document.getElementById('reach-grid').innerHTML =
        `<div class="pending">Vimeo APIキー待ち — ${d._note || 'APIキーをKeychain登録後に自動取得'}</div>`;
      return;
    }
    const vids = d.videos || [];
    const avg = key => {
      const vals = vids.map(v => v[key]).filter(v => v != null);
      return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10 : null;
    };
    const checkpoints = [
      ['1秒到達率',  avg('reach_1sec'),   [85, 95]],
      ['3秒到達率',  avg('reach_3sec'),   [70, 85]],
      ['5秒到達率',  avg('reach_5sec'),   [55, 70]],
      ['10秒到達率', avg('reach_10sec'),  [45, 60]],
      ['15秒到達率', avg('reach_15sec'),  [40, 55]],
    ];
    document.getElementById('reach-grid').innerHTML = checkpoints.map(([label, val, th]) => {
      const cls = colorClass(val, th);
      const barW = val != null ? Math.min(100, val) : 0;
      return `<div class="kpi-card">
        <div class="kpi-label">${label}</div>
        <div class="kpi-val ${cls}">${pct(val)}</div>
        <div class="bar-wrap"><div class="bar ${cls}" style="width:${barW}%"></div></div>
      </div>`;
    }).join('');
  }).catch(() => {});

// Meta Creative データ
fetch('../analytics/meta_creative_latest.json?_=' + Date.now())
  .then(r => r.json()).then(d => {
    document.getElementById('status-bar').textContent = `集計日: ${d.date || '-'} | 分析広告数: ${d.summary?.total_ads_analyzed || 0}件 | 総広告費(7d): ${fmt(d.summary?.total_spend_7d)}`;

    // Hook Score ランキング
    const topHooks = d.top_creatives_by_hook_score || [];
    if (topHooks.length === 0) {
      document.getElementById('hook-rank').innerHTML = '<div class="pending">データなし（meta_creative_agent.pyを実行してください）</div>';
    } else {
      const maxScore = Math.max(...topHooks.map(a => a.hook_score || 0), 1);
      document.getElementById('hook-rank').innerHTML = `
        <div style="font-size:11px;color:#6b6355;margin-bottom:8px;">Hook Score = CTR/CPM × 10000（高いほど効率的なフック）</div>
        ${topHooks.map((a, i) => `
          <div style="margin-bottom:8px;padding:8px;background:#fafaf7;border:1px solid #e8e0d0;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
              <span style="font-weight:bold;color:#3d6b38;">#${i+1}</span>
              <span class="tag tag-${a.creative_type}">${a.creative_type}</span>
              <span style="flex:1;font-size:11px;">${a.ad_name?.substring(0,45) || '-'}</span>
              <span style="color:#6b6355;font-size:10px;">${a.account_name || ''}</span>
            </div>
            <div class="score-bar">
              <span style="font-size:10px;color:#6b6355;min-width:120px;">Hook Score: <strong>${a.hook_score}</strong></span>
              <div class="bar-wrap" style="flex:1"><div class="bar good" style="width:${Math.round(a.hook_score/maxScore*100)}%"></div></div>
            </div>
            <div style="font-size:10px;color:#6b6355;margin-top:4px;">
              CPM: ${fmt(a.cpm_7d)} | CTR: ${a.ctr_7d}% | リード: ${a.leads_7d}件 | CPL: ${fmt(a.cpl_7d)}
            </div>
          </div>
        `).join('')}`;
    }

    // Creative Type 比較
    const byType = d.by_creative_type || {};
    const video = byType.video || {};
    const image = byType.image || {};
    const best = video.cpl && image.cpl ? (video.cpl < image.cpl ? 'video' : 'image') : '-';
    document.getElementById('type-compare').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="kpi-card" style="${best==='video'?'border:2px solid #2a7a2a;':''}" >
          <div class="kpi-label">🎥 動画クリエイティブ</div>
          <div style="font-size:11px;margin-top:6px;">広告費: ${fmt(video.spend)}</div>
          <div style="font-size:11px;">リード: ${video.leads||0}件</div>
          <div style="font-size:14px;font-weight:bold;color:${best==='video'?'#2a7a2a':'#1a5fa8'};margin-top:4px;">CPL ${fmt(video.cpl)}</div>
          <div style="font-size:11px;color:#6b6355;">CPM: ${fmt(video.cpm_avg)}</div>
          ${best==='video'?'<div style="font-size:10px;color:#2a7a2a;margin-top:4px;font-weight:bold;">✓ 優位</div>':''}
        </div>
        <div class="kpi-card" style="${best==='image'?'border:2px solid #2a7a2a;':''}" >
          <div class="kpi-label">🖼 画像クリエイティブ</div>
          <div style="font-size:11px;margin-top:6px;">広告費: ${fmt(image.spend)}</div>
          <div style="font-size:11px;">リード: ${image.leads||0}件</div>
          <div style="font-size:14px;font-weight:bold;color:${best==='image'?'#2a7a2a':'#1a5fa8'};margin-top:4px;">CPL ${fmt(image.cpl)}</div>
          <div style="font-size:11px;color:#6b6355;">CPM: ${fmt(image.cpm_avg)}</div>
          ${best==='image'?'<div style="font-size:10px;color:#2a7a2a;margin-top:4px;font-weight:bold;">✓ 優位</div>':''}
        </div>
      </div>`;

    // アラート
    const alerts = d.alerts || [];
    if (alerts.length > 0) {
      document.getElementById('alert-section').style.display = '';
      document.getElementById('alerts').innerHTML = '🚨 アラート<br>' + alerts.map(a => `・${a}`).join('<br>');
    }

    // 全広告テーブル
    const allAds = [];
    Object.values(d.accounts || {}).forEach(acc => {
      (acc.ads || []).forEach(a => allAds.push({...a, _acc: acc.name}));
    });
    allAds.sort((a,b) => (b.hook_score||0) - (a.hook_score||0));

    if (allAds.length === 0) {
      document.getElementById('ad-table').innerHTML = '<div class="pending">データなし</div>';
    } else {
      document.getElementById('ad-table').innerHTML = `
        <table>
          <thead><tr>
            <th>広告名</th><th>タイプ</th><th>Hook Score</th><th>CPM</th><th>CTR</th><th>リード</th><th>CPL</th>
          </tr></thead>
          <tbody>
            ${allAds.slice(0,30).map(a => {
              const hc = a.hook_score >= 1 ? 'good' : a.hook_score >= 0.3 ? 'warn' : 'danger';
              const cc = a.cpl_7d == null ? '' : a.cpl_7d > 2000 ? 'danger' : a.cpl_7d > 1000 ? 'warn' : 'good';
              return `<tr>
                <td title="${a.ad_name}">${a.ad_name?.substring(0,35)||'-'}</td>
                <td><span class="tag tag-${a.creative_type}">${a.creative_type}</span></td>
                <td style="font-weight:bold;color:${hc==='good'?'#2a7a2a':hc==='warn'?'#b07000':'#c0392b'}">${a.hook_score||0}</td>
                <td>${fmt(a.cpm_7d)}</td>
                <td>${a.ctr_7d||0}%</td>
                <td>${a.leads_7d||0}</td>
                <td style="color:${cc==='good'?'#2a7a2a':cc==='warn'?'#b07000':'#c0392b'}">${fmt(a.cpl_7d)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    }
  }).catch(() => {
    document.getElementById('status-bar').textContent = 'meta_creative_latest.jsonが未生成 — meta_creative_agent.pyを実行してください';
    document.getElementById('hook-rank').innerHTML = '<div class="pending">meta_creative_agent.pyを実行してデータを生成してください</div>';
  });
</script>
</div>
</body>
</html>
