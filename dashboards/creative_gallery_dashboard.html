<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Creative Gallery — クリエイティブ一覧</title>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f8fafc;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;font-size:14px;}
.topbar{background:#1e293b;padding:0 16px;display:flex;align-items:center;gap:0;height:44px;overflow-x:auto;white-space:nowrap;}
.topbar .brand{font-size:13px;font-weight:700;color:#f1f5f9;margin-right:20px;flex-shrink:0;}
.topbar a{color:#94a3b8;font-size:12px;padding:0 12px;height:44px;line-height:44px;display:inline-block;border-bottom:2px solid transparent;text-decoration:none;}
.topbar a:hover,.topbar a.active{color:#f1f5f9;border-bottom-color:#3b82f6;}
.main{max-width:1200px;margin:0 auto;padding:16px;}
.page-title{font-size:18px;font-weight:500;color:#0f172a;margin-bottom:4px;}
.filter-bar{background:#fff;border:0.5px solid #e2e8f0;padding:10px 14px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-radius:8px;}
.filter-bar label{font-size:11px;color:#64748b;font-weight:500;}
.filter-btn{background:#f1f5f9;border:0.5px solid #e2e8f0;padding:5px 12px;cursor:pointer;font-size:11px;border-radius:99px;font-family:inherit;color:#475569;}
.filter-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.filter-btn.win{background:#dcfce7;border-color:#16a34a;color:#14532d;}
.filter-btn.win.active{background:#16a34a;color:#fff;}
.filter-btn.lose{background:#fee2e2;border-color:#dc2626;color:#991b1b;}
.filter-btn.lose.active{background:#dc2626;color:#fff;}
select{border:0.5px solid #e2e8f0;background:#fff;padding:5px 10px;font-size:11px;border-radius:6px;font-family:inherit;}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.card{background:#fff;border:0.5px solid #e2e8f0;cursor:pointer;transition:box-shadow .15s;border-radius:8px;overflow:hidden;}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);}
.card-img{width:100%;height:120px;object-fit:cover;background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:11px;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-body{padding:12px;}
.card-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.tag{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:500;}
.tag-win{background:#dcfce7;color:#14532d;}
.tag-ok{background:#dbeafe;color:#1e3a8a;}
.tag-lose{background:#fee2e2;color:#991b1b;}
.tag-pend{background:#f1f5f9;color:#475569;}
.tag-meta{background:#dbeafe;color:#1e3a8a;}
.tag-yt{background:#ffedd5;color:#9a3412;}
.tag-line{background:#dcfce7;color:#14532d;}
.kpi-row{display:flex;gap:5px;font-size:10px;flex-wrap:wrap;margin-bottom:6px;}
.kpi-chip{background:#f8fafc;border:0.5px solid #e2e8f0;padding:2px 7px;border-radius:4px;}
.kpi-chip strong{color:#2563eb;}
.kpi-chip.roas-win strong{color:#16a34a;}
.kpi-chip.roas-lose strong{color:#dc2626;}
.card-improve{font-size:10px;color:#64748b;border-top:0.5px solid #f1f5f9;padding-top:7px;margin-top:6px;}
.card-improve span{color:#d97706;font-weight:500;}
.review-row{display:flex;gap:6px;margin-top:8px;}
.review-btn{background:#f1f5f9;border:0.5px solid #e2e8f0;padding:4px 10px;cursor:pointer;font-size:10px;border-radius:99px;flex:1;text-align:center;font-family:inherit;}
.review-btn:hover{background:#e2e8f0;}
.review-btn.approved{background:#dcfce7;border-color:#16a34a;color:#14532d;}
.review-btn.rejected{background:#fee2e2;border-color:#dc2626;color:#991b1b;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;overflow-y:auto;padding:20px;}
.modal-bg.open{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:#fff;border:0.5px solid #e2e8f0;max-width:700px;width:100%;margin:auto;border-radius:12px;overflow:hidden;}
.modal-head{background:#f8fafc;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #e2e8f0;}
.modal-head h2{font-size:14px;font-weight:500;}
.modal-close{cursor:pointer;font-size:20px;color:#64748b;line-height:1;}
.modal-body{padding:18px;}
.modal-img{width:100%;max-height:200px;object-fit:contain;background:#f8fafc;margin-bottom:14px;border-radius:6px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.detail-kpi{border:0.5px solid #e2e8f0;padding:10px;text-align:center;border-radius:6px;}
.detail-kpi .label{font-size:10px;color:#64748b;}
.detail-kpi .val{font-weight:500;font-size:18px;margin-top:2px;color:#0f172a;}
.detail-section{margin-bottom:14px;}
.detail-section h3{font-size:12px;font-weight:500;color:#475569;border-bottom:0.5px solid #e2e8f0;padding-bottom:5px;margin-bottom:8px;}
.detail-list li{font-size:12px;padding:3px 0;list-style:none;padding-left:12px;position:relative;}
.detail-list li::before{content:'·';position:absolute;left:0;color:#64748b;}
.pending{color:#94a3b8;font-size:12px;text-align:center;padding:24px;}
#total-count{font-size:12px;color:#64748b;margin-bottom:10px;}
.status-bar{font-size:12px;color:#64748b;margin-bottom:12px;}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">CMO</span>
  <a href="cmo_index.html">全体</a>
  <a href="roas_by_creative.html">ROAS分析</a>
  <a href="creative_intelligence_dashboard.html">AI分析</a>
  <a href="creative_gallery_dashboard.html" class="active">クリエイティブ一覧</a>
  <a href="hook_dashboard.html">Hook分析</a>
  <a href="retention_dashboard.html">Retention</a>
</div>
<div class="main">
<div class="page-title">Creative Gallery — クリエイティブ一覧</div>
<div id="status-bar" class="status-bar">読込中...</div>

<div class="filter-bar">
  <label>ステータス：</label>
  <button class="filter-btn active" data-status="all">全て</button>
  <button class="filter-btn win" data-status="win">勝ち</button>
  <button class="filter-btn" data-status="ok">及第</button>
  <button class="filter-btn lose" data-status="lose">負け</button>
  <button class="filter-btn" data-status="pending">保留</button>
  &nbsp;
  <label>チャネル：</label>
  <button class="filter-btn active" data-ch="all">全て</button>
  <button class="filter-btn" data-ch="meta">Meta</button>
  <button class="filter-btn" data-ch="youtube">YouTube</button>
  <button class="filter-btn" data-ch="line">LINE</button>
  &nbsp;
  <label>並び替え：</label>
  <select id="sort-key">
    <option value="roas">ROAS順</option>
    <option value="revenue">売上順</option>
    <option value="attendance_rate">着席率順</option>
    <option value="conv_rate">成約率順</option>
    <option value="spend">広告費順</option>
  </select>
</div>

<div id="total-count"></div>
<div id="gallery" class="gallery"><div class="pending">読込中...</div></div>

<!-- 詳細モーダル -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">詳細</h2>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const fmt = n => n == null ? '-' : '¥' + Math.round(n).toLocaleString('ja-JP');
const pct = n => n == null ? '-' : n.toFixed(1) + '%';
const colorRoas = v => v == null ? '' : v >= 500 ? 'roas-win' : v < 300 ? 'roas-lose' : '';
const tagStatus = s => {
  const m = {win:'✅ 勝ち',ok:'○ 及第',lose:'🛑 負け',pending:'保留'}[s]||s;
  const c = {win:'tag-win',ok:'tag-ok',lose:'tag-lose',pending:'tag-pend'}[s]||'tag-pend';
  return `<span class="tag ${c}">${m}</span>`;
};
const tagCh = ch => {
  if (ch==='meta') return '<span class="tag tag-meta">Meta</span>';
  if (ch==='youtube') return '<span class="tag tag-yt">YT</span>';
  if (ch==='line') return '<span class="tag tag-line">LINE</span>';
  return ch ? `<span class="tag" style="background:#f0f0f0;color:#666">${ch}</span>` : '';
};
const shortName = name => {
  const m = name.match(/[（(]([^）)]+)[）)]/);
  return m ? m[1] : name.substring(0,28);
};

let allCreatives = [];
let activeStatus = 'all';
let activeCh = 'all';
let reviewLog = { reviews: [] };

try { reviewLog = JSON.parse(localStorage.getItem('creative_review_log') || '{"reviews":[]}'); } catch(e) {}

fetch('../analytics/creative_intelligence_latest.json?_=' + Date.now())
  .then(r => r.json())
  .then(d => {
    allCreatives = d.creatives || [];
    const s = d.summary || {};
    document.getElementById('status-bar').textContent =
      `集計日: ${d.date} | 全${s.total}件 | 勝ち${s.win} 及第${s.ok} 負け${s.lose} 保留${s.pending}`;
    render();
  })
  .catch(() => {
    document.getElementById('gallery').innerHTML =
      '<div class="pending">creative_intelligence_agent.pyを実行してください</div>';
  });

// フィルターイベント
document.querySelectorAll('[data-status]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStatus = btn.dataset.status;
    render();
  });
});
document.querySelectorAll('[data-ch]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-ch]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCh = btn.dataset.ch;
    render();
  });
});
document.getElementById('sort-key').addEventListener('change', render);

function getVal(c, key) {
  if (key === 'roas') return c.sales?.roas || 0;
  if (key === 'revenue') return c.sales?.revenue || 0;
  if (key === 'attendance_rate') return c.seminar?.attendance_rate || 0;
  if (key === 'conv_rate') return c.sales?.conversion_rate || 0;
  if (key === 'spend') return c.ad?.spend || 0;
  return 0;
}

function render() {
  const sortKey = document.getElementById('sort-key').value;
  let list = [...allCreatives];
  if (activeStatus !== 'all') list = list.filter(c => c.analysis?.status === activeStatus);
  if (activeCh !== 'all') list = list.filter(c => c.channel === activeCh);
  list.sort((a,b) => getVal(b,sortKey) - getVal(a,sortKey));

  document.getElementById('total-count').textContent = `${list.length}件表示`;

  if (!list.length) {
    document.getElementById('gallery').innerHTML = '<div class="pending">該当なし</div>';
    return;
  }

  document.getElementById('gallery').innerHTML = list.map((c, i) => {
    const roas = c.sales?.roas;
    const rc = colorRoas(roas);
    const improve = (c.analysis?.improvements || [])[0] || '';
    const reviewEntry = reviewLog.reviews?.find(r => r.item_id === c.ad_code);
    const reviewStatus = reviewEntry?.status || '';

    return `<div class="card" onclick="openModal(${i})">
      <div class="card-img">
        ${c.ad?.creative_url
          ? `<img src="${c.ad.creative_url}" alt="${c.ad_code}" onerror="this.parentNode.innerHTML='<span>${c.ad_code||'画像なし'}</span>'">`
          : `<span>${c.ad_code || '画像データなし'}</span>`}
      </div>
      <div class="card-body">
        <div class="card-name" title="${c.name}">${shortName(c.name)}</div>
        <div class="card-tags">
          ${tagStatus(c.analysis?.status)}
          ${tagCh(c.channel)}
        </div>
        <div class="kpi-row">
          <div class="kpi-chip ${rc}">ROAS <strong>${pct(roas)}</strong></div>
          <div class="kpi-chip">着席 <strong>${pct(c.seminar?.attendance_rate)}</strong></div>
          <div class="kpi-chip">成約 <strong>${pct(c.sales?.conversion_rate)}</strong></div>
        </div>
        <div class="kpi-row">
          <div class="kpi-chip">費 <strong>${c.ad?.spend ? '¥'+(c.ad.spend/10000).toFixed(0)+'万' : '-'}</strong></div>
          <div class="kpi-chip">売上 <strong>${c.sales?.revenue ? '¥'+(c.sales.revenue/10000).toFixed(0)+'万' : '-'}</strong></div>
          <div class="kpi-chip">CPL <strong>${fmt(c.ad?.cpl)}</strong></div>
        </div>
        ${improve ? `<div class="card-improve"><span>📌</span> ${improve.substring(0,50)}</div>` : ''}
        <div class="review-row">
          <button class="review-btn ${reviewStatus==='approved'?'approved':''}"
            onclick="event.stopPropagation();doReview('${c.ad_code}','${shortName(c.name).replace(/'/g,'`')}','approved',this)">採用</button>
          <button class="review-btn ${reviewStatus==='rejected'?'rejected':''}"
            onclick="event.stopPropagation();doReview('${c.ad_code}','${shortName(c.name).replace(/'/g,'`')}','rejected',this)">却下</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // グローバルに保持
  window._galleryList = list;
}

function openModal(idx) {
  const c = window._galleryList[idx];
  if (!c) return;
  document.getElementById('modal-title').textContent = shortName(c.name);
  const roas = c.sales?.roas;
  const rc = roas >= 500 ? '#2a7a2a' : roas >= 300 ? '#b07000' : '#c0392b';

  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:8px;">${tagStatus(c.analysis?.status)} ${tagCh(c.channel)} <span style="font-size:10px;color:#9b8e7e;">${c.ad_code || ''}</span></div>

    <div class="detail-grid">
      <div class="detail-kpi"><div class="label">ROAS</div><div class="val" style="color:${rc}">${pct(roas)}</div></div>
      <div class="detail-kpi"><div class="label">着席率</div><div class="val">${pct(c.seminar?.attendance_rate)}</div></div>
      <div class="detail-kpi"><div class="label">成約率</div><div class="val">${pct(c.sales?.conversion_rate)}</div></div>
      <div class="detail-kpi"><div class="label">広告費</div><div class="val" style="font-size:13px;">${fmt(c.ad?.spend)}</div></div>
      <div class="detail-kpi"><div class="label">売上</div><div class="val" style="font-size:13px;">${fmt(c.sales?.revenue)}</div></div>
      <div class="detail-kpi"><div class="label">CPL</div><div class="val" style="font-size:13px;">${fmt(c.ad?.cpl)}</div></div>
      <div class="detail-kpi"><div class="label">申込数</div><div class="val">${c.seminar?.apply_count ?? '-'}</div></div>
      <div class="detail-kpi"><div class="label">着席数</div><div class="val">${c.seminar?.attendance_count ?? '-'}</div></div>
      <div class="detail-kpi"><div class="label">成約数</div><div class="val">${c.sales?.conversion_count ?? '-'}</div></div>
      <div class="detail-kpi"><div class="label">Hook Score</div><div class="val">${c.ad?.hook_score?.toFixed(2) ?? '-'}</div></div>
      <div class="detail-kpi"><div class="label">CPO</div><div class="val" style="font-size:13px;">${fmt(c.sales?.cpo)}</div></div>
      <div class="detail-kpi"><div class="label">着席単価</div><div class="val" style="font-size:13px;">${fmt(c.seminar?.attendance_cpa)}</div></div>
    </div>

    ${c.analysis?.win_factors?.length ? `
      <div class="detail-section">
        <h3>✅ 勝ち要因</h3>
        <ul class="detail-list">${c.analysis.win_factors.map(f=>`<li>・${f}</li>`).join('')}</ul>
      </div>` : ''}

    ${c.analysis?.lose_factors?.length ? `
      <div class="detail-section">
        <h3>🛑 負け要因</h3>
        <ul class="detail-list">${c.analysis.lose_factors.map(f=>`<li>・${f}</li>`).join('')}</ul>
      </div>` : ''}

    ${c.analysis?.improvements?.length ? `
      <div class="detail-section">
        <h3>💡 改善提案</h3>
        <ul class="detail-list">${c.analysis.improvements.map(f=>`<li>・${f}</li>`).join('')}</ul>
      </div>` : ''}

    <div class="detail-section" style="font-size:10px;color:#9b8e7e;border-top:1px solid #f0ebe0;padding-top:8px;">
      状態 — GA4: ${c.lp?._status || '-'} | Kit: ${c.email?._status || '-'} | LINE: ${c.line?._status || '-'}
    </div>

    <div class="review-row" style="margin-top:12px;">
      <button class="review-btn" style="flex:1;padding:6px;" onclick="doReview('${c.ad_code}','${shortName(c.name).replace(/'/g,'`')}','approved',this)">✅ 採用（横展開）</button>
      <button class="review-btn" style="flex:1;padding:6px;" onclick="doReview('${c.ad_code}','${shortName(c.name).replace(/'/g,'`')}','rejected',this)">🛑 停止</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

function doReview(adCode, name, status, btn) {
  if (!reviewLog.reviews) reviewLog.reviews = [];
  reviewLog.reviews = reviewLog.reviews.filter(r => r.item_id !== adCode);
  reviewLog.reviews.push({
    date: new Date().toISOString().substring(0,16),
    type: 'creative', item_id: adCode, text: name, status
  });
  try { localStorage.setItem('creative_review_log', JSON.stringify(reviewLog)); } catch(e) {}
  render();
  if (status === 'approved') {
    btn.className = 'review-btn approved';
    btn.textContent = '✅ 採用済み';
  } else {
    btn.className = 'review-btn rejected';
    btn.textContent = '🛑 停止済み';
  }
}
</script>
</div>
</body>
</html>
