<!DOCTYPE html>
<html lang="ja">
<head><script src="/cmo-dashboard/config.js"></script>
<meta charset="UTF-8">
<title>Full Funnel ROAS — クリエイティブ別分析</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f7f4ee; color:#2c2a26; font-family:'Courier New',monospace; font-size:13px; padding:16px; }
h1 { font-size:15px; color:#1a1a1a; border-bottom:1px solid #d4c9b0; padding-bottom:6px; margin-bottom:12px; }
.nav { background:#eee8da; border:1px solid #d4c9b0; padding:8px 12px; margin-bottom:16px; display:flex; gap:16px; flex-wrap:wrap; }
.nav a { color:#6b6355; text-decoration:none; }
.nav a.active, .nav a:hover { color:#1a5fa8; font-weight:bold; }
.section { margin-bottom:20px; }
.box { background:#fff; border:1px solid #d4c9b0; padding:12px; margin-bottom:8px; }
.box-title { color:#3d6b38; font-weight:bold; margin-bottom:8px; border-bottom:1px solid #e8e0d0; padding-bottom:4px; font-size:13px; }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; }
.kpi-card { background:#fff; border:1px solid #d4c9b0; padding:10px; text-align:center; }
.kpi-label { color:#6b6355; font-size:10px; }
.kpi-val { font-weight:bold; font-size:18px; color:#1a5fa8; margin-top:4px; }
.kpi-sub { font-size:10px; color:#9b8e7e; margin-top:2px; }
.good { color:#2a7a2a !important; }
.warn { color:#b07000 !important; }
.danger { color:#c0392b !important; }
table { width:100%; border-collapse:collapse; font-size:11px; }
th { background:#eee8da; color:#3d6b38; padding:6px 8px; text-align:left; border-bottom:1px solid #d4c9b0; position:sticky; top:0; }
th.r { text-align:right; }
td { padding:5px 8px; border-bottom:1px solid #f0ebe0; vertical-align:middle; }
td.r { text-align:right; }
tr:hover td { background:#fdfbf7; }
.rank-num { color:#3d6b38; font-weight:bold; min-width:24px; display:inline-block; }
.bar-wrap { display:inline-block; width:80px; height:6px; background:#e8e0d0; border-radius:3px; vertical-align:middle; margin-left:4px; }
.bar-fill { height:100%; border-radius:3px; background:#1a5fa8; }
.bar-fill.good { background:#2a7a2a; }
.bar-fill.warn { background:#b07000; }
.bar-fill.danger { background:#c0392b; }
.tag { display:inline-block; padding:1px 5px; border-radius:3px; font-size:10px; font-weight:bold; }
.tag-meta { background:#e8f0ff; color:#1a5fa8; }
.tag-youtube { background:#fff0e0; color:#b05000; }
.tag-line { background:#e8ffe8; color:#2a7a2a; }
.tag-other { background:#f0f0f0; color:#666; }
.candidate-card { border:1px solid #d4c9b0; padding:10px; margin-bottom:6px; background:#fafaf7; font-size:11px; }
.candidate-card.scale { border-left:3px solid #2a7a2a; }
.candidate-card.stop  { border-left:3px solid #c0392b; }
.candidate-card.expand { border-left:3px solid #1a5fa8; }
.pending { color:#9b8e7e; font-size:12px; text-align:center; padding:20px; }
.data-src { font-size:10px; color:#b0a898; margin-left:4px; }
.funnel-row { display:flex; align-items:center; gap:8px; padding:4px 0; border-bottom:1px solid #f0ebe0; font-size:11px; }
.funnel-stage { min-width:90px; color:#6b6355; }
.funnel-val { min-width:70px; font-weight:bold; }
.col-filter { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.col-filter button { background:#eee8da; border:1px solid #d4c9b0; padding:3px 10px; cursor:pointer; font-size:11px; border-radius:3px; }
.col-filter button.active { background:#1a5fa8; color:#fff; border-color:#1a5fa8; }
.tabs { display:flex; gap:0; margin-bottom:-1px; }
.tab { padding:5px 14px; border:1px solid #d4c9b0; border-bottom:none; background:#eee8da; cursor:pointer; font-size:12px; }
.tab.active { background:#fff; font-weight:bold; color:#1a5fa8; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
#sort-bar { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
#sort-bar select { border:1px solid #d4c9b0; background:#fff; padding:3px 8px; font-size:11px; }
#sort-bar label { font-size:11px; color:#6b6355; }
</style>
</head>
<body>
<div class="nav">
  <a href="cmo_index.html">■ 全体</a>
  <a href="cmo_ad.html">▶ 広告</a>
  <a href="roas_by_creative.html" class="active">▶ ROAS分析</a>
  <a href="hook_dashboard.html">▶ Hook分析</a>
  <a href="retention_dashboard.html">▶ Retention</a>
</div>

<h1>📊 Full Funnel ROAS — クリエイティブ別分析</h1>

<div id="status-bar" style="font-size:11px;color:#9b8e7e;margin-bottom:12px;">読込中...</div>

<!-- サマリーKPI -->
<div class="section">
  <div class="kpi-grid" id="summary-kpi">
    <div class="pending">読込中...</div>
  </div>
</div>

<!-- 予算判断 3パネル -->
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;">
  <div class="box">
    <div class="box-title" style="color:#2a7a2a;">✅ 予算増額候補</div>
    <div id="scale-cards" class="pending">読込中...</div>
  </div>
  <div class="box">
    <div class="box-title" style="color:#c0392b;">🛑 停止候補</div>
    <div id="stop-cards" class="pending">読込中...</div>
  </div>
  <div class="box">
    <div class="box-title" style="color:#1a5fa8;">↗ 横展開候補</div>
    <div id="expand-cards" class="pending">読込中...</div>
  </div>
</div>

<!-- ランキングタブ -->
<div class="section">
  <div class="tabs" id="rank-tabs">
    <div class="tab active" data-tab="roas">ROAS</div>
    <div class="tab" data-tab="cpo">CPO</div>
    <div class="tab" data-tab="cpl">CPL</div>
    <div class="tab" data-tab="att_cpa">着席単価</div>
    <div class="tab" data-tab="apply_rate">申込率</div>
    <div class="tab" data-tab="conv_rate">成約率</div>
    <div class="tab" data-tab="hook">Hook Score</div>
  </div>
  <div class="box" style="border-top:none;">
    <div id="ranking-table" style="overflow-x:auto;"></div>
  </div>
</div>

<!-- 全クリエイティブ テーブル -->
<div class="section">
  <div class="box">
    <div class="box-title">━ 全クリエイティブ フルファネル一覧</div>
    <div id="sort-bar">
      <label>並び替え：</label>
      <select id="sort-key">
        <option value="roas">ROAS順</option>
        <option value="revenue">売上順</option>
        <option value="spend">広告費順</option>
        <option value="conv">成約数順</option>
        <option value="apply">申込数順</option>
        <option value="attendance_rate">着席率順</option>
      </select>
      <div class="col-filter" id="ch-filter"></div>
    </div>
    <div style="overflow-x:auto;">
      <div id="full-table"></div>
    </div>
  </div>
</div>

<script>
const fmt = n => n == null ? '-' : '¥' + Math.round(n).toLocaleString('ja-JP');
const fmtK = n => n == null ? '-' : '¥' + (Math.round(n)/1000).toFixed(0) + 'K';
const pct  = n => n == null ? '-' : n.toFixed(1) + '%';
const num  = n => n == null ? '-' : Math.round(n).toLocaleString('ja-JP');
const f1   = n => n == null ? '-' : n.toFixed(1);
const colorRoas   = v => v == null ? '' : v >= 400 ? 'good' : v >= 200 ? 'warn' : 'danger';
const colorCpo    = v => v == null ? '' : v <= 100000 ? 'good' : v <= 200000 ? 'warn' : 'danger';
const colorCpl    = v => v == null ? '' : v <= 1000 ? 'good' : v <= 2000 ? 'warn' : 'danger';
const colorAttCpa = v => v == null ? '' : v <= 30000 ? 'good' : v <= 50000 ? 'warn' : 'danger';
const colorRate   = (v, lo, hi) => v == null ? '' : v >= hi ? 'good' : v >= lo ? 'warn' : 'danger';
const tagHtml = ch => {
  if (!ch) return '';
  if (ch === 'meta')    return '<span class="tag tag-meta">Meta</span>';
  if (ch === 'youtube') return '<span class="tag tag-youtube">YT</span>';
  if (ch === 'line')    return '<span class="tag tag-line">LINE</span>';
  return `<span class="tag tag-other">${ch}</span>`;
};
const shortName = name => {
  const m = name.match(/（([^）]+)）/) || name.match(/\(([^)]+)\)/);
  return m ? m[1] : name.substring(0, 30);
};

let allCreatives = [];
let currentTab   = 'roas';
let currentSort  = 'roas';
let activeChannels = new Set();

fetch('../analytics/conversion_flow_latest.json?_=' + Date.now())
  .then(r => r.json())
  .then(d => {
    const today = d.date || '-';
    const s = d.summary || {};
    document.getElementById('status-bar').textContent =
      `集計日: ${today} | クリエイティブ: ${s.creative_count || 0}件 | 予算増額候補: ${s.scale_count || 0}件 | 停止候補: ${s.stop_count || 0}件`;

    allCreatives = (d.creatives || []).filter(c => c.sheet);
    activeChannels = new Set(allCreatives.map(c => c.channel).filter(Boolean));

    renderSummaryKpi(s);
    renderCandidates(d.recommendations || {});
    renderRanking(d.rankings || {}, currentTab);
    renderChannelFilter();
    renderFullTable();
  })
  .catch(err => {
    document.getElementById('status-bar').textContent = 'conversion_flow_latest.json 未生成 — conversion_flow_agent.py を実行してください';
    ['summary-kpi','scale-cards','stop-cards','expand-cards','ranking-table','full-table'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = '<div class="pending">conversion_flow_agent.pyを実行してデータを生成してください</div>';
    });
  });

// ───── サマリーKPI ─────
function renderSummaryKpi(s) {
  const roasC = colorRoas(s.blended_roas);
  const kpis = [
    ['総広告費',   fmt(s.total_ad_spend || s.ad_spend),  ''],
    ['総売上',     fmt(s.total_revenue  || s.revenue),   ''],
    ['ブレンドROAS', pct(s.blended_roas || s.roas),       roasC],
    ['申込数',     num(s.seminar_apply_total),            ''],
    ['着席数',     num(s.attendance_count),               ''],
    ['成約数',     num(s.conversion_count),               ''],
    ['成約率',     pct(s.conversion_rate),               colorRate(s.conversion_rate, 8, 15)],
    ['成約単価',   fmt(s.conversion_unit),               ''],
  ];
  document.getElementById('summary-kpi').innerHTML = kpis.map(([label, val, cls]) =>
    `<div class="kpi-card">
      <div class="kpi-label">${label}</div>
      <div class="kpi-val ${cls}">${val}</div>
    </div>`
  ).join('');
}

// ───── 候補カード ─────
function renderCandidates(recs) {
  const scaleHtml = (recs.scale || []).length
    ? recs.scale.slice(0,5).map(c => `
        <div class="candidate-card scale">
          <div style="font-weight:bold;color:#2a7a2a;">${shortName(c.name)} <span class="data-src">${c.ad_code||''}</span></div>
          <div style="margin-top:3px;color:#2c2a26;">ROAS: <strong>${pct(c.roas)}</strong></div>
          <div style="color:#6b6355;font-size:10px;">${c.reason||''}</div>
        </div>`).join('')
    : '<div class="pending" style="padding:12px;">条件該当なし (ROAS≥400% AND 着席率≥30%)</div>';

  const stopHtml = (recs.stop || []).length
    ? recs.stop.slice(0,5).map(c => `
        <div class="candidate-card stop">
          <div style="font-weight:bold;color:#c0392b;">${shortName(c.name)}</div>
          <div style="margin-top:3px;">ROAS: <strong class="danger">${pct(c.roas)}</strong> | 費: ${fmt(c.spend)}</div>
          <div style="color:#6b6355;font-size:10px;">${c.reason||''}</div>
        </div>`).join('')
    : '<div class="pending" style="padding:12px;">条件該当なし (費用≥¥50K AND ROAS<200%)</div>';

  const expandHtml = (recs.expand || []).length
    ? recs.expand.slice(0,5).map(c => `
        <div class="candidate-card expand">
          <div style="font-weight:bold;color:#1a5fa8;">${shortName(c.name)}</div>
          <div style="margin-top:3px;">ROAS: <strong>${pct(c.roas)}</strong>${c.hook_score ? ' | Hook: ' + c.hook_score : ''}</div>
          <div style="color:#6b6355;font-size:10px;">${c.reason||''}</div>
        </div>`).join('')
    : '<div class="pending" style="padding:12px;">条件該当なし</div>';

  document.getElementById('scale-cards').innerHTML  = scaleHtml;
  document.getElementById('stop-cards').innerHTML   = stopHtml;
  document.getElementById('expand-cards').innerHTML = expandHtml;
}

// ───── ランキングタブ ─────
const RANK_DEFS = {
  roas:      { label: 'ROAS',      unit: '%',  asc: false, key: 'by_roas',              color: colorRoas,   fmt: v => pct(v) },
  cpo:       { label: 'CPO',       unit: '円', asc: true,  key: 'by_cpo',               color: colorCpo,    fmt: v => fmt(v) },
  cpl:       { label: 'CPL',       unit: '円', asc: true,  key: 'by_cpl',               color: colorCpl,    fmt: v => fmt(v) },
  att_cpa:   { label: '着席単価',   unit: '円', asc: true,  key: 'by_attendance_cpa',    color: colorAttCpa, fmt: v => fmt(v) },
  apply_rate:{ label: 'セミナー申込率', unit: '%', asc: false, key: 'by_seminar_apply_rate', color: v => colorRate(v,20,40), fmt: v => pct(v) },
  conv_rate: { label: '成約率',     unit: '%',  asc: false, key: 'by_conversion_rate',   color: v => colorRate(v,8,15), fmt: v => pct(v) },
  hook:      { label: 'Hook Score', unit: '',   asc: false, key: 'by_hook_score',         color: v => v >= 1 ? 'good' : v >= 0.3 ? 'warn' : 'danger', fmt: v => v == null ? '-' : v.toFixed(2) },
};

let cachedRankings = {};
function renderRanking(rankings, tab) {
  cachedRankings = rankings;
  currentTab = tab;
  const def = RANK_DEFS[tab];
  if (!def) return;
  const data = rankings[def.key] || [];
  if (!data.length) {
    document.getElementById('ranking-table').innerHTML = '<div class="pending">データなし</div>';
    return;
  }
  const maxVal = Math.max(...data.map(r => r.value || 0), 1);
  document.getElementById('ranking-table').innerHTML = `
    <div style="font-size:11px;color:#6b6355;margin-bottom:6px;">${def.asc ? '低い順（優良）' : '高い順（優良）'} | TOP ${data.length}件</div>
    <table>
      <thead><tr>
        <th>順位</th><th>クリエイティブ</th><th>ch</th><th class="r">${def.label}</th><th></th>
        <th class="r">ROAS</th><th class="r">成約数</th><th class="r">売上</th>
      </tr></thead>
      <tbody>
        ${data.map(r => {
          const cls = def.color(r.value);
          const barW = Math.round(Math.abs(r.value || 0) / maxVal * 100);
          const creative = allCreatives.find(c => c.name === r.name) || {};
          const roas = creative.sales?.roas;
          const conv = creative.sales?.conversion_count;
          const revenue = creative.sales?.revenue;
          return `<tr>
            <td><span class="rank-num">#${r.rank}</span></td>
            <td title="${r.name}">${shortName(r.name)}</td>
            <td>${tagHtml(r.channel)}</td>
            <td class="r ${cls}" style="font-weight:bold;">${def.fmt(r.value)}</td>
            <td><div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${barW}%"></div></div></td>
            <td class="r ${colorRoas(roas)}">${pct(roas)}</td>
            <td class="r">${num(conv)}</td>
            <td class="r">${fmtK(revenue)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

document.getElementById('rank-tabs').addEventListener('click', e => {
  const tab = e.target.dataset.tab;
  if (!tab) return;
  currentTab = tab;
  document.querySelectorAll('#rank-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderRanking(cachedRankings, tab);
});

// ───── チャネルフィルター ─────
function renderChannelFilter() {
  const channels = [...activeChannels];
  document.getElementById('ch-filter').innerHTML = channels.map(ch =>
    `<button class="active" data-ch="${ch}">${ch}</button>`
  ).join('');
  document.getElementById('ch-filter').addEventListener('click', e => {
    const ch = e.target.dataset.ch;
    if (!ch) return;
    e.target.classList.toggle('active');
    if (activeChannels.has(ch)) activeChannels.delete(ch);
    else activeChannels.add(ch);
    renderFullTable();
  });
}

// ───── 全クリエイティブテーブル ─────
function renderFullTable() {
  const sortKey = document.getElementById('sort-key')?.value || 'roas';
  const filtered = allCreatives.filter(c => activeChannels.has(c.channel));

  filtered.sort((a, b) => {
    const getV = (c, k) => {
      if (k === 'roas')    return c.sales?.roas || 0;
      if (k === 'revenue') return c.sales?.revenue || 0;
      if (k === 'spend')   return c.ad?.spend || 0;
      if (k === 'conv')    return c.sales?.conversion_count || 0;
      if (k === 'apply')   return c.seminar?.apply_count || 0;
      if (k === 'attendance_rate') return c.seminar?.attendance_rate || 0;
      return 0;
    };
    return getV(b, sortKey) - getV(a, sortKey);
  });

  if (!filtered.length) {
    document.getElementById('full-table').innerHTML = '<div class="pending">表示対象なし</div>';
    return;
  }

  document.getElementById('full-table').innerHTML = `
    <table>
      <thead><tr>
        <th>クリエイティブ</th>
        <th>ch</th>
        <th class="r">広告費</th>
        <th class="r">CPL</th>
        <th class="r">Hook</th>
        <th class="r">申込数</th>
        <th class="r">申込率</th>
        <th class="r">着席数</th>
        <th class="r">着席率</th>
        <th class="r">着席単価</th>
        <th class="r">成約数</th>
        <th class="r">成約率</th>
        <th class="r">CPO</th>
        <th class="r">売上</th>
        <th class="r">ROAS</th>
      </tr></thead>
      <tbody>
        ${filtered.map(c => {
          const ad = c.ad || {};
          const sem = c.seminar || {};
          const sal = c.sales || {};
          const rc = colorRoas(sal.roas);
          return `<tr>
            <td title="${c.name}" style="max-width:180px;overflow:hidden;white-space:nowrap;">${shortName(c.name)}</td>
            <td>${tagHtml(c.channel)}</td>
            <td class="r">${fmtK(ad.spend)}</td>
            <td class="r ${colorCpl(ad.cpl)}">${fmt(ad.cpl)}</td>
            <td class="r ${ad.hook_score >= 1 ? 'good' : ad.hook_score >= 0.3 ? 'warn' : ''}">${ad.hook_score ? ad.hook_score.toFixed(2) : '-'}</td>
            <td class="r">${num(sem.apply_count)}</td>
            <td class="r ${colorRate(sem.apply_rate,20,40)}">${pct(sem.apply_rate)}</td>
            <td class="r">${num(sem.attendance_count)}</td>
            <td class="r ${colorRate(sem.attendance_rate,25,40)}">${pct(sem.attendance_rate)}</td>
            <td class="r ${colorAttCpa(sem.attendance_cpa)}">${fmt(sem.attendance_cpa)}</td>
            <td class="r">${num(sal.conversion_count)}</td>
            <td class="r ${colorRate(sal.conversion_rate,8,15)}">${pct(sal.conversion_rate)}</td>
            <td class="r ${colorCpo(sal.cpo)}">${fmt(sal.cpo)}</td>
            <td class="r">${fmtK(sal.revenue)}</td>
            <td class="r ${rc}" style="font-weight:bold;">${pct(sal.roas)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

document.getElementById('sort-key')?.addEventListener('change', renderFullTable);
</script>
</body>
</html>
